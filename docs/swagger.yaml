              $ref: "#/components/schemas/PageMenu"
    MenuTreeListResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/MenuTree"
    SystemConfigResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SystemConfig"
    APIResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/API" }
    APIPageResponse:
      allOf:
        - $ref: "#/components/schemas/Response"
        - type: object
          properties:
